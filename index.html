<!DOCTYPE html>
<html>
<body>
<pre id="out"></pre>
<script>
function log(msg) {
    document.getElementById('out').textContent += msg + '\n';
}

function leakReceiverViaSuperGet() {
    class Leaker {
        leak() {
            return super.secret;
        }
    }

    let leakedReceiver = null;

    Leaker.prototype.__proto__ = new Proxy({}, {
        get(target, prop, receiver) {
            log(`[+] Proxy trap called for property "${prop}"`);

            // Save for external access or debug
            leakedReceiver = receiver;

            // 🔬 Coercion tests
            try {
                log(`typeof receiver: ${typeof receiver}`);
            } catch (e) {
                log(`typeof threw: ${e.message}`);
            }

            try {
                log(`receiver.constructor: ${receiver.constructor}`);
            } catch (e) {
                log(`receiver.constructor threw: ${e.message}`);
            }

            try {
                log(`receiver instanceof Object: ${receiver instanceof Object}`);
            } catch (e) {
                log(`instanceof threw: ${e.message}`);
            }

            try {
                log(`String(receiver): ${String(receiver)}`);
            } catch (e) {
                log(`String(receiver) threw: ${e.message}`);
            }

            try {
                log(`receiver + "": ${receiver + ""}`);
            } catch (e) {
                log(`receiver + "" threw: ${e.message}`);
            }

            try {
                log(`receiver == "[object Object]": ${receiver == "[object Object]"}`);
            } catch (e) {
                log(`comparison threw: ${e.message}`);
            }

            try {
                log(`JSON.stringify(receiver): ${JSON.stringify(receiver)}`);
            } catch (e) {
                log(`JSON.stringify threw: ${e.message}`);
            }

            try {
                let desc = Object.getOwnPropertyDescriptors(receiver);
                log(`Object.getOwnPropertyDescriptors: ${JSON.stringify(desc)}`);
            } catch (e) {
                log(`Object.getOwnPropertyDescriptors threw: ${e.message}`);
            }

            return 0;
        }
    });

    const { leak } = Leaker.prototype;
    leak(); // Trigger leak
}

leakReceiverViaSuperGet();
</script>
</body>
</html>
