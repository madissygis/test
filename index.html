<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>WebKit content-visibility UAF PoC</title>
  <style>
    .container {
      width: 200px;
      height: 200px;
      border: 2px solid black;
      margin: 40px;
    }
    .child {
      width: 100px;
      height: 100px;
      background: blue;
      margin: 40px;
    }
    #log {
      font-family: monospace;
      background: #eee;
      padding: 10px;
      min-height: 60px;
      margin: 20px 0;
    }
  </style>
</head>
<body>
  <h1>WebKit content-visibility UAF PoC</h1>
  <div class="container">
    <div class="child"></div>
  </div>
  <div id="log"></div>
  <button id="resetBtn">Reset</button>
  <button id="triggerBtn">Trigger UAF</button>
  <script type="module">
    import { triggerUAF, resetPoC } from './poc.js';
    document.getElementById("resetBtn").onclick = () => resetPoC();
    document.getElementById("triggerBtn").onclick = () => triggerUAF();
  </script>
</body>
</html>
