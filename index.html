<!DOCTYPE html>
<html>
<head>
  <title>Proxy Super Exploit Test</title>
  <meta charset="UTF-8">
</head>
<body>
  <h1>Proxy Super Exploit Test</h1>
  <script>
    // Exploit test for Proxy `get` trap scope leak via super.property in WebKit (PS4)
    var leakedReceiver;
    const handler = {
      get(target, prop, receiver) {
        leakedReceiver = receiver;
        if (prop === "foo") return function() {};
        return target[prop];
      }
    };

    const base = new Proxy({}, handler);

    class Exploit extends Object {
      foo() { return super.foo(); }
    }
    Object.setPrototypeOf(Exploit.prototype, base);

    const obj = new Exploit();
    obj.foo();

    // Show result by throwing an error (should display on PS4 WebKit)
    throw new Error(
      "Leaked receiver: [" + leakedReceiver + "] " +
      "Type: " + (leakedReceiver && leakedReceiver.constructor && leakedReceiver.constructor.name)
    );
  </script>
</body>
</html>
