<!DOCTYPE html>
<html>
<body>
<pre id="out"></pre>
<script>
function log(msg) {
    document.getElementById('out').textContent += msg + '\n';
}

function leakReceiverViaSuperGet() {
    class Leaker {
        leak() {
            return super.secret;
        }
    }

    let leakedReceiver = null;

    Leaker.prototype.__proto__ = new Proxy({}, {
        get(target, propertyName, receiver) {
            leakedReceiver = receiver;
            log("typeof receiver: " + typeof leakedReceiver);
            try {
                log("receiver.constructor: " + leakedReceiver.constructor);
            } catch (e) {
                log("receiver.constructor threw: " + e.message);
            }
            log("receiver instanceof Object: " + (leakedReceiver instanceof Object));
            log("Object.getPrototypeOf(receiver): " + Object.getPrototypeOf(leakedReceiver));
            log("Object.isExtensible(receiver): " + Object.isExtensible(leakedReceiver));
            try {
                log("Own property names: " + Object.getOwnPropertyNames(leakedReceiver).join(', '));
            } catch (e) {
                log("Object.getOwnPropertyNames threw: " + e.message);
            }

            for (let key in leakedReceiver) {
                log("receiver[" + key + "] = " + leakedReceiver[key]);
            }

            return 42;
        }
    });

    const { leak } = Leaker.prototype;
    leak(); // trigger leak
}
leakReceiverViaSuperGet();
</script>
</body>
</html>
