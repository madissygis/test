<!DOCTYPE html>
<html>
<head>
  <title>Proxy Super Leak Type Inspect</title>
  <meta charset="UTF-8">
</head>
<body>
<script>
var leakedReceiver;
const handler = {
  get(target, prop, receiver) {
    leakedReceiver = receiver;
    if (prop === "foo") return function() {};
    return target[prop];
  }
};

const base = new Proxy({}, handler);

class Exploit extends Object {
  foo() { return super.foo(); }
}
Object.setPrototypeOf(Exploit.prototype, base);

const obj = new Exploit();
obj.foo();

var type = leakedReceiver ? (leakedReceiver.constructor && leakedReceiver.constructor.name) : "undefined/null";
document.body.innerHTML = "<pre style='font-size:2em;'>"
  + "leakedReceiver: " + leakedReceiver + "\n"
  + "Type: " + type + "\n"
  + "typeof: " + (typeof leakedReceiver) + "\n"
  + "</pre>";
</script>
</body>
</html>
