<!DOCTYPE html>
<html>
<head>
  <title>Proxy Super Exploit Test (Hang)</title>
  <meta charset="UTF-8">
</head>
<body>
<script>
var leakedReceiver;
const handler = {
  get(target, prop, receiver) {
    leakedReceiver = receiver;
    if (prop === "foo") return function() {};
    return target[prop];
  }
};

const base = new Proxy({}, handler);

class Exploit extends Object {
  foo() { return super.foo(); }
}
Object.setPrototypeOf(Exploit.prototype, base);

const obj = new Exploit();
obj.foo();

// If leakedReceiver is not undefined/null, hang
if (leakedReceiver && typeof leakedReceiver === "object") {
  // Enter infinite loop (browser will freeze)
  while (true) {}
}
</script>
</body>
</html>
